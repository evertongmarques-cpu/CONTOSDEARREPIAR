<style>
  /* Seus estilos originais mantidos integralmente */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0c0b;
    --bg2: #111009;
    --bg3: #181512;
    --card: #131110;
    --border: rgba(210,185,140,0.11);
    --border-hover: rgba(210,185,140,0.28);
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --text: #c5c2bd;
    --text-dim: #8a8682;
    --accent: #5a0a0a;
  }
  body {
    background-color: var(--bg);
    background-image: 
      radial-gradient(circle at 50% -20%, #1a1812 0%, transparent 70%),
      url("https://www.transparenttextures.com/patterns/black-paper.png");
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem;
    min-height: 100vh;
  }

  /* Estilos específicos para a nova seção do livro */
  .new-book-section {
    width: 100%;
    max-width: 480px;
    margin-bottom: 2.5rem;
    text-align: center;
  }
  .book-cover-main {
    width: 220px;
    height: auto;
    border: 1px solid var(--gold);
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    margin-bottom: 1.5rem;
    transition: transform 0.4s ease;
  }
  .book-cover-main:hover {
    transform: scale(1.03);
  }

  .container { width: 100%; max-width: 480px; }
  header { text-align: center; margin-bottom: 3rem; }
  .profile-frame {
    width: 110px; height: 110px;
    margin: 0 auto 1.5rem;
    position: relative;
    padding: 5px;
    border: 1px solid var(--gold);
    border-radius: 50%;
  }
  .profile-img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    filter: sepia(0.3) contrast(1.1);
  }
  h1 { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 0.5rem; }
  .bio { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.15rem; color: var(--text-dim); }

  .links-grid { display: flex; flex-direction: column; gap: 1rem; }
  .link-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1.1rem;
    border-radius: 4px;
    display: flex;
    align-items: center;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
  }
  .link-card:hover {
    background: var(--bg2);
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .icon-wrapper {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    margin-right: 1rem;
    color: var(--gold);
  }
  .link-info h2 { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 1px; color: var(--gold-light); }
</style>
</head>
